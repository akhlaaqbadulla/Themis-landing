name: Deploy to GitHub Pages

# Every push to main rebuilds and republishes the site to GitHub Pages.
# workflow_dispatch lets you redeploy manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deploy; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble published site (only real assets)
        run: |
          mkdir -p dist
          rsync -a ./ dist/ \
            --exclude dist \
            --exclude .git \
            --exclude .github \
            --exclude scripts \
            --exclude node_modules \
            --exclude package.json \
            --exclude package-lock.json \
            --exclude Prompts \
            --exclude CLAUDE.md \
            --exclude README.md \
            --exclude .gitignore
          touch dist/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
