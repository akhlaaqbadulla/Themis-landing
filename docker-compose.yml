services:
  themis-landing:
    build: .
    image: themis-landing:latest
    container_name: themis-landing
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.themis-landing.rule=Host(`the-company.ai`)"
      - "traefik.http.routers.themis-landing.entrypoints=websecure"
      - "traefik.http.routers.themis-landing.tls=true"
      - "traefik.http.routers.themis-landing.tls.certresolver=le"
      - "traefik.http.services.themis-landing.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.themis-headers.headers.stsSeconds=63072000"
      - "traefik.http.middlewares.themis-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.themis-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.themis-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.themis-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.themis-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.themis-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.themis-headers.headers.customFrameOptionsValue=SAMEORIGIN"
      - "traefik.http.middlewares.themis-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.themis-headers.headers.customResponseHeaders.X-Frame-Options=SAMEORIGIN"
      - "traefik.http.middlewares.themis-headers.headers.customResponseHeaders.X-Robots-Tag=index,follow"
      - "traefik.http.routers.themis-landing.middlewares=themis-headers,crowdsec@file"
    networks:
      - traefik_net

networks:
  traefik_net:
    name: traefik-public
    external: true
